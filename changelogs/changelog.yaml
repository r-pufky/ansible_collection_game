---
ancestor: 0.0.9
releases:
  1.0.0:
    release_date: '2026-03-20'
    codename: '2026-03-20'
    changes:
      release_summary: 'Migrate to Ansible 2.20 (breaking changes).'
      major_changes:
        - 'Ansible 2.20 migration.'
        - 'Dev: Backend VM testing switched to libvirt.'
        - >
          Dev: Backend environment updated and auto-configured resolving Molecule
          25.1.0+ breakage (#301, #4380).
      minor_changes:
        - 'roles/* - Migrate remaining documentation.'
      breaking_changes:
        - >
          All roles have breaking changes. As ansible 2.19 resulted in touching a
          lot of old roles, the opportunity was used to update all roles and
          resolve issues with them. Changes across all roles include:

          * Feature Flags.
          * Migration to semantic versioning (collection and roles).
          * Ansible 2.20 support.
          * Removal of unused modules in the pre-release.

          All consumers must check roles. Major breaking changes will be avoided
          again until then next round of breaking ansible changes.
      deprecated_features:
        - 'N/A'
      removed_features:
        - 'N/A'
      security_fixes:
        - 'N/A'
      bugfixes:
        - 'N/A'
